# Ground truth for the `vulnerable-app` fixture.
#
# Each `findings[]` entry is a bug we believe the scanner *should* detect.
# The evaluator uses this file to compute recall (did we hit it?), precision
# (did the scanner report things that are NOT in here?), and a severity
# confusion matrix (did the scanner agree on how bad it is?).
#
# Matching rules:
#   - file must match exactly
#   - reported [line_start, line_end] must overlap the ground-truth range,
#     extended by `match_policy.line_slack` lines on each side
#   - category match is by `category` OR any string in `aliases`, case-insensitive
#
# Fields:
#   id           stable identifier; never reuse after deletion
#   file         path relative to this fixture's root
#   line_start   first line of the buggy region (1-indexed, inclusive)
#   line_end     last line of the buggy region (1-indexed, inclusive)
#   category     canonical bug class (kebab-case)
#   cwe          best-fit CWE identifier; informational only
#   severity     expected severity: critical | high | medium | low | info
#   must_detect  true = counts toward recall; false = bonus credit only
#   aliases      additional rule_id / category strings that should still count
#                as a hit (handles scanner-specific naming)
#   notes        free-form rationale; kept short

target: vulnerable-app
schema_version: 1

match_policy:
  line_slack: 5
  severity_order: [info, low, medium, high, critical]

findings:
  # --- src/db.rs --------------------------------------------------------------
